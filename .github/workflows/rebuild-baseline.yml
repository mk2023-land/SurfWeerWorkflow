name: Rebuild Seasonal Baseline

on:
  workflow_dispatch:
  schedule:
    # Jaarlijks op 1 januari om 02:00 UTC (~03:00 NL CET).
    - cron: '0 2 1 1 *'

jobs:
  rebuild-baseline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies (reproducible from uv.lock)
        run: uv sync --frozen

      - name: Rebuild seasonal baseline
        run: |
          mkdir -p data
          uv run python -m src.baseline.seasonal

      - name: Upload baseline artifact
        uses: actions/upload-artifact@v4
        with:
          name: seasonal-baseline
          path: data/seasonal_baseline.json
          retention-days: 365

      - name: Commit new baseline
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/seasonal_baseline.json
          git diff --staged --quiet || git commit -m "Update seasonal baseline $(date +'%Y-%m-%d')"
          git push
