name: Rebuild Seasonal Baseline

on:
  workflow_dispatch:  # Handmatige trigger
  schedule:
    # Jaarlijks op 1 januari om 03:00 NL tijd
    - cron: '0 2 1 1 *'  # 03:00 NL tijd (winter UTC+1)

jobs:
  rebuild-baseline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create data directory
      run: mkdir -p data

    - name: Rebuild seasonal baseline
      run: |
        cd src
        python baseline/seasonal.py

    - name: Upload baseline artifact
      uses: actions/upload-artifact@v3
      with:
        name: seasonal-baseline
        path: data/seasonal_baseline.json
        retention-days: 365

    - name: Commit new baseline
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add data/seasonal_baseline.json
        git diff --staged --quiet || git commit -m "Update seasonal baseline $(date +'%Y-%m-%d')"
        git push