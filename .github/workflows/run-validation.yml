name: Run Validation

on:
  workflow_dispatch:  # Handmatige trigger
  pull_request:
    paths:
      - 'src/scoring/**/*.py'
      - 'src/alerts/**/*.py'
      - 'tests/**'

jobs:
  run-validation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies (reproducible from uv.lock)
      run: uv sync --frozen

    - name: Create data directory
      run: mkdir -p data

    - name: Run unit tests
      run: uv run pytest tests/test_scoring.py -v --tb=short

    - name: Run validation backtest
      run: uv run python scripts/run_validation_backtest.py

    - name: Upload validation results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: validation-results-${{ github.run_id }}
        path: |
          tests/validation_output.json
          data/forecasts_log.jsonl
        retention-days: 30

    - name: Comment PR with results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          let comment = '## Validation Results\n\n';

          // Unit test results
          try {
            const testResults = fs.readFileSync('pytest-results.txt', 'utf8');
            comment += '### Unit Tests\n```\n' + testResults + '\n```\n\n';
          } catch (e) {
            comment += '### Unit Tests\nFailed to read results\n\n';
          }

          // Validation backtest results
          try {
            const validationResults = fs.readFileSync('tests/validation_output.json', 'utf8');
            const data = JSON.parse(validationResults);
            comment += `### Backtest Validation\n`;
            comment += `- Total cases: ${data.total_cases}\n`;
            comment += `- Passed: ${data.passed_cases} (${(data.accuracy*100).toFixed(1)}%)\n`;
            comment += `- Failed: ${data.failed_cases}\n\n`;

            if (data.accuracy >= 0.70) {
              comment += '✅ Validation passed (≥70% accuracy)\n';
            } else {
              comment += '❌ Validation failed (<70% accuracy)\n';
            }
          } catch (e) {
            comment += '### Backtest Validation\nFailed to read results\n\n';
          }

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });