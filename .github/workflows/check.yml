name: Surf Alert Check

on:
  schedule:
    # GitHub Actions cron-jitter voor private repos is significant
    # (gedocumenteerd: 30min - 3u delay is normaal, soms langer). Eén
    # cron rond 5:15 UTC kwam in praktijk pas om 8:36 UTC binnen → te
    # laat voor de ochtenddigest. Daarom: meerdere crons in de vroege
    # ochtend zodat zelfs bij ergste jitter er een vroeg genoeg vuurt.
    #
    # `is_morning_first_run` in alerts/engine.py controleert
    # last_digest_time.date() == today, dus alleen de eerste run die
    # binnen het 5-13 NL venster vuurt verstuurt de digest. Daarna
    # zijn de andere ochtend-runs idempotent (alleen alert-detectie).
    #
    # UTC tijden — CEST (zomer) = +2u, CET (winter) = +1u.
    - cron: '0 3 * * *'    # 03:00 UTC = 05:00 NL CEST — vroegste backup
    - cron: '30 3 * * *'   # 03:30 UTC = 05:30 NL CEST
    - cron: '0 4 * * *'    # 04:00 UTC = 06:00 NL CEST — target ochtend
    - cron: '30 4 * * *'   # 04:30 UTC = 06:30 NL CEST — buffer
    - cron: '0 5 * * *'    # 05:00 UTC = 07:00 NL CEST — late ochtend
    - cron: '15 11 * * *'  # 11:15 UTC = 13:15 NL CEST — middag check
    - cron: '15 17 * * *'  # 17:15 UTC = 19:15 NL CEST — avond
    - cron: '15 23 * * *'  # 23:15 UTC = 01:15 NL CEST — nacht
  workflow_dispatch:

# Fix #5: voorkom parallelle runs van check.yml. Bij workflow_dispatch tijdens
# een geplande schedule-run zouden twee runners hetzelfde data/state.json (in
# de cache) kunnen lezen, elk hun eigen update doen en pas op `cache/save`
# clobberen → één van de twee state-updates verdwijnt → weekly cap drift,
# verloren cooldowns. cancel-in-progress=false zodat de eerste run af mag
# maken (anders verliezen we juist de geplande run).
concurrency:
  group: surf-alert-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  check-surf-conditions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies (reproducible from uv.lock)
        run: uv sync --frozen

      # Persistente data over runs heen. Cache pakt ALLE jsonl + state files
      # in data/ — kritiek voor Sprint 4 trainingdata (bias_log.jsonl,
      # buoy_spectra_history.jsonl), digest-state (state.json) en forecasts-log.
      # GitHub Actions cache: 10 GB max per repo, entries expireren na 7d
      # zonder hit; daily runs houden alles vers.
      #
      # BELANGRIJK — unique key per run. GitHub Actions cache kan een
      # bestaande key NIET overschrijven (save is een silent no-op met
      # warning), dus een statische key bevriest de cache na de eerste save.
      # Concrete bug die dit veroorzaakte: state.json bleef hangen op
      # last_digest_time uit run #N, daarna stuurde elke ochtend-run
      # opnieuw een digest. Concurrency-group hieronder voorkomt parallelle
      # runs, dus geen race-condities tussen unique keys.
      - name: Restore persistent data cache
        uses: actions/cache/restore@v5
        with:
          path: data/
          key: surf-data-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            surf-data-

      - name: Run surf alert check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

          # Notifier-keuze (default ntfy push).
          NOTIFIER: ${{ vars.NOTIFIER || 'ntfy' }}

          # ntfy.sh push (default, gratis)
          NTFY_TOPIC:  ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ vars.NTFY_SERVER || 'https://ntfy.sh' }}

          # Email (alleen gebruikt als NOTIFIER=email)
          SMTP_HOST:       ${{ vars.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT:       ${{ vars.SMTP_PORT || '587' }}
          SMTP_USER:       ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:   ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_NAME:  ${{ vars.SMTP_FROM_NAME || 'Noordwijk Surf Alert' }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}

          # Twilio (alleen gebruikt als NOTIFIER=twilio)
          TWILIO_ACCOUNT_SID:     ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:      ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER:    ${{ secrets.TWILIO_PHONE_NUMBER }}
          RECIPIENT_PHONE_NUMBER: ${{ secrets.RECIPIENT_PHONE_NUMBER }}

          ALERTS_ENABLED:      ${{ vars.ALERTS_ENABLED || 'true' }}
          COOLDOWN_HOURS:      ${{ vars.COOLDOWN_HOURS || '4' }}
          MAX_ALERTS_PER_WEEK: ${{ vars.MAX_ALERTS_PER_WEEK || '8' }}
          DEBUG: 'false'
          # workflow_dispatch = manual test → verstuur wel maar pollueer
          # last_digest_time NIET (anders blokkeert die de scheduled cron-run).
          MANUAL_RUN: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: |
          mkdir -p data
          uv run python -m src.main

      - name: Upload forecasts log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: forecasts-log-${{ github.run_id }}
          path: data/forecasts_log.jsonl
          retention-days: 90

      - name: Upload surf alert log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surf-alert-log-${{ github.run_id }}
          path: data/surf_alert.log
          retention-days: 30

      # Save cache aan het einde, ook als eerdere steps faalden (if: always()),
      # maar NIET op manual workflow_dispatch runs — die zijn voor testing en
      # mogen de productie-cache (cooldowns, weekly counters, bias_log) niet
      # vervuilen. MANUAL_RUN wordt gezet door de run-step hierboven; we
      # checken hier opnieuw via github.event_name zodat de conditie niet
      # afhangt van env-vars uit een eerdere step.
      - name: Save persistent data cache
        if: always() && github.event_name != 'workflow_dispatch'
        uses: actions/cache/save@v5
        with:
          path: data/
          key: surf-data-${{ github.run_id }}-${{ github.run_attempt }}
