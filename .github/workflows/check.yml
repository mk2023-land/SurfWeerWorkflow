name: Surf Alert Check

on:
  schedule:
    # 4x per dag. UTC tijden — in CEST (zomer) = +2u, in CET (winter) = +1u.
    # Doel: ochtend-run rond 6-8 NL (digest-venster), middag, avond, nacht.
    - cron: '15 5,11,17,23 * * *'
  workflow_dispatch:

jobs:
  check-surf-conditions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore persistent state cache
        uses: actions/cache@v4
        with:
          path: data/state.json
          key: surf-state-${{ github.run_id }}
          restore-keys: |
            surf-state-

      - name: Restore seasonal baseline cache
        uses: actions/cache@v4
        with:
          path: data/seasonal_baseline.json
          key: surf-baseline-${{ github.run_id }}
          restore-keys: |
            surf-baseline-

      - name: Run surf alert check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

          # Notifier-keuze (default ntfy push).
          NOTIFIER: ${{ vars.NOTIFIER || 'ntfy' }}

          # ntfy.sh push (default, gratis)
          NTFY_TOPIC:  ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ vars.NTFY_SERVER || 'https://ntfy.sh' }}

          # Email (alleen gebruikt als NOTIFIER=email)
          SMTP_HOST:       ${{ vars.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT:       ${{ vars.SMTP_PORT || '587' }}
          SMTP_USER:       ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:   ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_NAME:  ${{ vars.SMTP_FROM_NAME || 'Noordwijk Surf Alert' }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}

          # Twilio (alleen gebruikt als NOTIFIER=twilio)
          TWILIO_ACCOUNT_SID:     ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:      ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER:    ${{ secrets.TWILIO_PHONE_NUMBER }}
          RECIPIENT_PHONE_NUMBER: ${{ secrets.RECIPIENT_PHONE_NUMBER }}

          ALERTS_ENABLED:      ${{ vars.ALERTS_ENABLED || 'true' }}
          COOLDOWN_HOURS:      ${{ vars.COOLDOWN_HOURS || '4' }}
          MAX_ALERTS_PER_WEEK: ${{ vars.MAX_ALERTS_PER_WEEK || '8' }}
          DEBUG: 'false'
          # workflow_dispatch = manual test → verstuur wel maar pollueer
          # last_digest_time NIET (anders blokkeert die de scheduled cron-run).
          MANUAL_RUN: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: |
          mkdir -p data
          python src/main.py

      - name: Upload forecasts log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forecasts-log-${{ github.run_id }}
          path: data/forecasts_log.jsonl
          retention-days: 90

      - name: Upload surf alert log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surf-alert-log-${{ github.run_id }}
          path: data/surf_alert.log
          retention-days: 30
