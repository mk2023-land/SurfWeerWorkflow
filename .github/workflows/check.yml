name: Surf Alert Check

on:
  schedule:
    # 6 slots verspreid over de dag, elk 4u uit elkaar — sluit aan op
    # COOLDOWN_HOURS=4 (alerts). Eén ochtend-slot voor de digest, rest
    # voor alert-detectie. Repo is public sinds 2026-05-22, dus de
    # zware cron-jitter van private repos (1-3u) speelt niet meer en
    # er zijn geen meerdere ochtend-buffers meer nodig.
    #
    # `is_morning_first_run` in alerts/engine.py controleert
    # last_digest_time.date() == today; de 06:00 NL run vuurt binnen
    # het 5-13 NL venster en stuurt de digest. Andere slots doen
    # alleen alert-detectie (idempotent t.o.v. digest).
    #
    # UTC tijden — CEST (zomer) = +2u, CET (winter) = +1u.
    - cron: '0 4 * * *'    # 04:00 UTC = 06:00 NL CEST — ochtend-digest
    - cron: '0 8 * * *'    # 08:00 UTC = 10:00 NL CEST — alert
    - cron: '0 12 * * *'   # 12:00 UTC = 14:00 NL CEST — alert
    - cron: '0 16 * * *'   # 16:00 UTC = 18:00 NL CEST — alert
    - cron: '0 20 * * *'   # 20:00 UTC = 22:00 NL CEST — alert
    - cron: '0 0 * * *'    # 00:00 UTC = 02:00 NL CEST — alert (nacht)
  workflow_dispatch:

# Fix #5: voorkom parallelle runs van check.yml. Bij workflow_dispatch tijdens
# een geplande schedule-run zouden twee runners hetzelfde data/state.json (in
# de cache) kunnen lezen, elk hun eigen update doen en pas op `cache/save`
# clobberen → één van de twee state-updates verdwijnt → weekly cap drift,
# verloren cooldowns. cancel-in-progress=false zodat de eerste run af mag
# maken (anders verliezen we juist de geplande run).
concurrency:
  group: surf-alert-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  check-surf-conditions:
    runs-on: ubuntu-latest
    # Harde bovengrens: zonder dit draait een hangende externe call (RWS,
    # Open-Meteo, Anthropic, Twilio) tot de GitHub-default van 6u en blokkeert
    # — met cancel-in-progress:false — de volgende cron-slots in de wachtrij.
    timeout-minutes: 15
    # contents:write nodig om data/sms_archive/YYYY-MM.jsonl te committen
    # naar main — vangt het ML-trainingsmateriaal permanent in git i.p.v.
    # afhankelijk van de Actions cache (die expireert).
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies (reproducible from uv.lock)
        run: uv sync --frozen

      # Persistente data over runs heen. Cache pakt ALLE jsonl + state files
      # in data/ — kritiek voor Sprint 4 trainingdata (bias_log.jsonl,
      # buoy_spectra_history.jsonl), digest-state (state.json) en forecasts-log.
      # GitHub Actions cache: 10 GB max per repo, entries expireren na 7d
      # zonder hit; daily runs houden alles vers.
      #
      # BELANGRIJK — unique key per run. GitHub Actions cache kan een
      # bestaande key NIET overschrijven (save is een silent no-op met
      # warning), dus een statische key bevriest de cache na de eerste save.
      # Concrete bug die dit veroorzaakte: state.json bleef hangen op
      # last_digest_time uit run #N, daarna stuurde elke ochtend-run
      # opnieuw een digest. Concurrency-group hieronder voorkomt parallelle
      # runs, dus geen race-condities tussen unique keys.
      - name: Restore persistent data cache
        uses: actions/cache/restore@v5
        with:
          path: data/
          key: surf-data-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            surf-data-

      - name: Run surf alert check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

          # Notifier-keuze (default ntfy push).
          NOTIFIER: ${{ vars.NOTIFIER || 'ntfy' }}

          # ntfy.sh push (default, gratis)
          NTFY_TOPIC:  ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ vars.NTFY_SERVER || 'https://ntfy.sh' }}

          # Email (alleen gebruikt als NOTIFIER=email)
          SMTP_HOST:       ${{ vars.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT:       ${{ vars.SMTP_PORT || '587' }}
          SMTP_USER:       ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:   ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_NAME:  ${{ vars.SMTP_FROM_NAME || 'Noordwijk Surf Alert' }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}

          # Twilio (alleen gebruikt als NOTIFIER=twilio)
          TWILIO_ACCOUNT_SID:     ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:      ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER:    ${{ secrets.TWILIO_PHONE_NUMBER }}
          RECIPIENT_PHONE_NUMBER: ${{ secrets.RECIPIENT_PHONE_NUMBER }}

          ALERTS_ENABLED:      ${{ vars.ALERTS_ENABLED || 'true' }}
          COOLDOWN_HOURS:      ${{ vars.COOLDOWN_HOURS || '4' }}
          MAX_ALERTS_PER_WEEK: ${{ vars.MAX_ALERTS_PER_WEEK || '8' }}
          DEBUG: 'false'
          # workflow_dispatch = manual test → verstuur wel maar pollueer
          # last_digest_time NIET (anders blokkeert die de scheduled cron-run).
          MANUAL_RUN: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: |
          mkdir -p data
          uv run python -m src.main

      # De gebruiker wil expliciet horen wanneer een alert/digest-run NIET werkt.
      # Vuurt bij elke harde fout: crash, data-fetch-failure (run_log.error) of
      # een mislukte notifier-send (main.py geeft dan exit-1). Stuurt los van de
      # normale notifier een ntfy-push, zodat een kapot notify-kanaal alsnog
      # zichtbaar wordt. `|| true` zodat een ntfy-hapering de job niet maskeert.
      - name: Notify on run failure
        if: failure() && github.event_name == 'schedule'
        env:
          NTFY_TOPIC:  ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ vars.NTFY_SERVER || 'https://ntfy.sh' }}
        run: |
          if [ -z "${NTFY_TOPIC}" ]; then
            echo "Geen NTFY_TOPIC — kan geen failure-push sturen"; exit 0
          fi
          curl -s --max-time 15 \
            -H "Title: Surf-check run FAALDE" \
            -H "Priority: high" \
            -H "Tags: warning" \
            -d "De surf-alert run van $(date -u +'%Y-%m-%d %H:%MZ') is mislukt (run ${{ github.run_id }}). Geen voorspelling verstuurd. Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "${NTFY_SERVER}/${NTFY_TOPIC}" || true

      - name: Upload forecasts log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: forecasts-log-${{ github.run_id }}
          path: data/forecasts_log.jsonl
          retention-days: 90

      - name: Upload surf alert log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surf-alert-log-${{ github.run_id }}
          path: data/surf_alert.log
          retention-days: 30

      # Save cache aan het einde, ook als eerdere steps faalden (if: always()),
      # maar NIET op manual workflow_dispatch runs — die zijn voor testing en
      # mogen de productie-cache (cooldowns, weekly counters, bias_log) niet
      # vervuilen. MANUAL_RUN wordt gezet door de run-step hierboven; we
      # checken hier opnieuw via github.event_name zodat de conditie niet
      # afhangt van env-vars uit een eerdere step.
      - name: Save persistent data cache
        if: always() && github.event_name != 'workflow_dispatch'
        uses: actions/cache/save@v5
        with:
          path: data/
          key: surf-data-${{ github.run_id }}-${{ github.run_attempt }}

      # Commit SMS-archief naar git. Alleen op scheduled runs (geen handmatige
      # tests), en alleen als er nieuwe entries zijn. Bewaart elke verstuurde
      # digest+alert permanent voor latere model-training — onafhankelijk van
      # cache-expiratie. Concurrency-group hierboven serializeert runs, dus
      # geen race. `git pull --rebase` vangt overlap met rebuild-baseline op.
      #
      # Naast het SMS-archief committen we ook data/state.json en
      # data/monthly_budget.json. Die dedup-state (cooldown, weekly-cap,
      # last_digest_time) leefde voorheen ALLEEN in de Actions-cache; bij
      # cache-eviction (7d/10GB LRU) viel het systeem terug op "first run"
      # → cooldown weg + weekly-cap reset → dubbele digest/alert mogelijk.
      # Door state in git te committen is de cache nog slechts een optimalisatie
      # en git de duurzame bron van waarheid. Beide files veranderen alleen bij
      # een echte send, dus de commit-frequentie blijft gelijk aan het archief.
      - name: Commit state + SMS archive to git
        if: github.event_name == 'schedule'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          for f in data/sms_archive data/state.json data/monthly_budget.json; do
            [ -e "$f" ] && git add "$f"
          done
          if git diff --staged --quiet; then
            echo "State + archief ongewijzigd — niets te committen"
            exit 0
          fi
          git commit -m "State + SMS-archief: $(date -u +'%Y-%m-%dT%H:%MZ') run"
          # Push met retry: bij een race (remote bewoog ná onze checkout, bv.
          # door rebuild-baseline of een handmatige commit) rebasen we onze
          # commit opnieuw bovenop main en pushen we nogmaals. Zonder retry
          # bleef de commit lokaal en ging de archief-entry permanent verloren.
          for i in 1 2 3; do
            if git pull --rebase --autostash origin main && git push; then
              echo "Archief gepusht (poging $i)"
              exit 0
            fi
            echo "Push poging $i mislukt — opnieuw na 5s"
            sleep 5
          done
          echo "::error::SMS-archief push faalde na 3 pogingen"
          exit 1
